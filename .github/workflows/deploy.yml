name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Production preflight
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy backend and frontend
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Load production deploy target
        id: deploy-target
        shell: bash
        run: |
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" || "$line" == \#* ]] && continue
            echo "$line" >> "$GITHUB_ENV"
            echo "$line" >> "$GITHUB_OUTPUT"
          done < deployment/production.env

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ steps.deploy-target.outputs.GCP_PROJECT_ID }}
          service: ${{ steps.deploy-target.outputs.CLOUD_RUN_SERVICE }}
          region: ${{ steps.deploy-target.outputs.GCP_REGION }}
          source: backend
          env_vars: |
            LLM_PROVIDER=gemini
            LLM_MODEL=gemma-4-26b-a4b-it
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            LIFF_CHANNEL_ID=${{ steps.deploy-target.outputs.LIFF_CHANNEL_ID }}
            LIFF_PATH=${{ steps.deploy-target.outputs.LIFF_PATH }}
            FIREBASE_HOSTING_URL=${{ steps.deploy-target.outputs.FIREBASE_HOSTING_URL }}
            WATER_LIFF_BASE_URL=${{ steps.deploy-target.outputs.FIREBASE_HOSTING_URL }}${{ steps.deploy-target.outputs.LIFF_PATH }}
            WATER_DEFAULT_GROUP_ID=${{ steps.deploy-target.outputs.WATER_DEFAULT_GROUP_ID }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.deploy-target.outputs.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.deploy-target.outputs.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ steps.deploy-target.outputs.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ steps.deploy-target.outputs.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ steps.deploy-target.outputs.VITE_FIREBASE_APP_ID }}
          VITE_LIFF_ID: ${{ steps.deploy-target.outputs.VITE_LIFF_ID }}
          VITE_API_BASE_URL: ${{ steps.deploy-target.outputs.VITE_API_BASE_URL }}
        run: npm run build

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project "${{ env.FIREBASE_PROJECT_ID }}"

      - name: Deploy Firestore rules and indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --project "${{ env.FIREBASE_PROJECT_ID }}"

      - name: Notify LINE group of successful deploy
        continue-on-error: true
        env:
          INTERNAL_HARNESS_SECRET: ${{ secrets.INTERNAL_HARNESS_SECRET }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          WORKFLOW_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          LIFF_URL="https://liff.line.me/${{ steps.deploy-target.outputs.LIFF_ID }}?v=${SHORT_SHA}"
          GROUP_ID="${{ steps.deploy-target.outputs.LIFF_DEPLOY_NOTIFY_GROUP_ID }}"
          CLOUD_RUN_URL="${{ steps.deploy-target.outputs.CLOUD_RUN_URL }}"

          PAYLOAD=$(printf '{"groupId":"%s","url":"%s","version":"%s","workflowUrl":"%s"}' \
            "$GROUP_ID" "$LIFF_URL" "$SHORT_SHA" "$WORKFLOW_URL")

          HTTP_STATUS=$(curl -s -o /tmp/notify_response.json -w "%{http_code}" \
            -X POST "${CLOUD_RUN_URL}/api/internal/deploy-notify" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${INTERNAL_HARNESS_SECRET}" \
            -d "$PAYLOAD")

          echo "Deploy notify HTTP status: ${HTTP_STATUS}"
          cat /tmp/notify_response.json
